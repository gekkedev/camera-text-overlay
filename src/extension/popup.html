<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camera Text Overlay</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        width: 400px;
        padding: 20px;
        background: #f5f5f5;
      }

      .container {
        background: white;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .header-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 18px;
        margin-bottom: 0;
        color: #333;
      }

      .settings-menu {
        position: relative;
        flex: 0 0 auto;
      }

      .settings-trigger {
        flex: 0 0 auto;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 999px;
        background: #fff;
        color: #444;
        font-size: 13px;
        font-weight: 600;
      }

      .settings-trigger:hover {
        background: #f8f8f8;
      }

      .settings-trigger:focus {
        outline: none;
        border-color: #6200ea;
        box-shadow: 0 0 0 2px rgba(98, 0, 234, 0.1);
      }

      .settings-panel {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        z-index: 10;
        width: 280px;
        padding: 14px;
        border: 1px solid #e2e2e2;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
      }

      .settings-title {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #666;
        margin-bottom: 10px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        font-weight: 500;
        color: #555;
        margin-bottom: 8px;
        font-size: 14px;
      }

      input[type="text"],
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
        font-family: inherit;
      }

      input[type="text"]:focus,
      select:focus {
        outline: none;
        border-color: #6200ea;
        box-shadow: 0 0 0 2px rgba(98, 0, 234, 0.1);
      }

      input[type="color"] {
        width: 100%;
        height: 40px;
        border: 1px solid #ddd;
        border-radius: 4px;
        cursor: pointer;
      }

      input[type="color"]:focus {
        outline: none;
        border-color: #6200ea;
      }

      .checkbox-field {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 0;
        cursor: pointer;
      }

      .checkbox-field input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 0;
        margin-top: 2px;
        flex: 0 0 auto;
      }

      .checkbox-field span {
        font-size: 13px;
        line-height: 1.4;
        color: #555;
        font-weight: 500;
      }

      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        font-family: inherit;
      }

      .btn-enable {
        background-color: #6200ea;
        color: white;
      }

      .btn-enable:hover {
        background-color: #7c3aed;
      }

      .btn-enable:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }

      .btn-disable {
        background-color: #d32f2f;
        color: white;
      }

      .btn-disable:hover {
        background-color: #f44336;
      }

      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }

      .status {
        padding: 12px;
        border-radius: 4px;
        margin-bottom: 15px;
        font-weight: 500;
        text-align: center;
      }

      .status.enabled {
        background-color: #c8e6c9;
        color: #2e7d32;
      }

      .status.disabled {
        background-color: #ffcccc;
        color: #c62828;
      }

      .divider {
        height: 1px;
        background: #e0e0e0;
        margin: 15px 0;
      }

      .info-text {
        font-size: 12px;
        color: #888;
        margin-top: 8px;
      }

      .preview-section {
        margin-top: 20px;
        padding: 14px;
        border: 1px solid #e2e2e2;
        border-radius: 8px;
        background: #fafafa;
      }

      .preview-title {
        font-size: 14px;
        font-weight: 600;
        color: #333;
        margin-bottom: 6px;
      }

      .preview-canvas {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 6px;
        background: #101010;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-row">
        <h1>🎥 Camera Text Overlay</h1>
        <div class="settings-menu">
          <button
            id="settingsToggleBtn"
            class="settings-trigger"
            type="button"
            aria-expanded="false"
            aria-controls="settingsPanel"
          >
            Settings
          </button>
          <div id="settingsPanel" class="settings-panel" hidden>
            <div class="settings-title">Preview</div>
            <label class="checkbox-field" for="previewBeforeToggle">
              <input type="checkbox" id="previewBeforeToggle" />
              <span>Preview before toggling on or off</span>
            </label>
            <div class="info-text">Show the bare camera before disabling or an overlay preview before enabling.</div>
          </div>
        </div>
      </div>

      <div id="status" class="status disabled">Overlay Disabled</div>

      <div class="form-group">
        <label for="overlayText">Overlay Text</label>
        <input type="text" id="overlayText" placeholder="Enter text to display" />
        <div class="info-text">What will others see on your camera</div>
      </div>

      <div class="form-group">
        <label for="selectedFont">Font</label>
        <select id="selectedFont">
          <option value="Titillium Web">Titillium Web</option>
          <option value="Arial">Arial</option>
          <option value="Verdana">Verdana</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Courier New">Courier New</option>
          <option value="Georgia">Georgia</option>
        </select>
      </div>

      <div class="form-group">
        <label for="bgColor">Background Color</label>
        <input type="color" id="bgColor" />
      </div>

      <div class="form-group">
        <label for="textColor">Text Color</label>
        <input type="color" id="textColor" />
      </div>

      <div class="button-group">
        <button id="saveBtn" class="btn-enable">Save Settings</button>
        <button id="toggleBtn" class="btn-enable">Enable Overlay</button>
      </div>

      <div id="previewSection" class="preview-section" hidden>
        <div id="previewTitle" class="preview-title">Preview</div>
        <div id="previewHint" class="info-text"></div>
        <canvas id="previewCanvas" class="preview-canvas" width="640" height="360"></canvas>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
